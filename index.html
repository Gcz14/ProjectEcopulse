<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoPulse</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
</head>

<body>

    <header>

        <h1 data-key="cabecalho.titulo"></h1>
        <p data-key="cabecalho.subtitulo"></p>
        <button data-key="cabecalho.botao" class="cta-button"></button>
    </header>

    <section class="SecaoUm">
        <h2 data-key="secaoUm.titulo"></h2>
        <div class="linha-fluida"></div>
        <div class="envoltório-conteudo">
            <div class="coluna-imagens">
                <div class="imagem-principal">
                    <img src="/assets/img/ee.jpg" alt="Floresta verde representando sustentabilidade">
                </div>
                <div class="imagem-secundaria">
                    <img src="/assets/img/dd.jpg" alt="Tecnologia sustentável e inovação verde">
                </div>
            </div>
            <div class="coluna-conteudo">
                <p class="texto-intro" data-key="secaoUm.paragrafo"></p>
                <div class="envoltório-recursos">
                    <p class="titulo-recursos" data-key="secaoUm.sub-titulo"></p>
                    <div class="fluxo-recursos">
                        <div class="item-recurso">
                            <div class="icone-recurso">📊</div>
                            <div class="texto-recurso" data-key="secaoUm.feature-textA">
                            </div>
                        </div>
                        <div class="item-recurso">
                            <div class="icone-recurso">💡</div>
                            <div class="texto-recurso" data-key="secaoUm.feature-textB">
                            </div>
                        </div>
                        <div class="item-recurso">
                            <div class="icone-recurso">🌳</div>
                            <div class="texto-recurso" data-key="secaoUm.feature-textC">
                            </div>
                        </div>
                        <div class="item-recurso">
                            <div class="icone-recurso">🏆</div>
                            <div class="texto-recurso" data-key="secaoUm.feature-textD">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <section class="SecaoDois">
        <h3 class="titulo-secao-dois" data-key="secaoDois.titulo"></h3>

        <div class="container-etapas">
            <div class="etapa">
                <span class="numero-etapa" data-key="secaoDois.step.0.numero"></span>
                <h3 class="titulo-etapa" data-key="secaoDois.step.0.titulo"></h3>
                <p class="descricao-etapa" data-key="secaoDois.step.0.texto"></p>
            </div>
            <div class="etapa">
                <span class="numero-etapa" data-key="secaoDois.step.1.numero"></span>
                <h3 class="titulo-etapa" data-key="secaoDois.step.1.titulo"></h3>
                <p class="descricao-etapa" data-key="secaoDois.step.1.texto"></p>
            </div>
        </div>
        <div class="container-etapas">
            <div class="etapa">
                <span class="numero-etapa" data-key="secaoDois.step.2.numero"></span>
                <h3 class="titulo-etapa" data-key="secaoDois.step.2.titulo"></h3>
                <p class="descricao-etapa" data-key="secaoDois.step.2.texto"></p>
            </div>

            <div class="etapa">
                <span class="numero-etapa" data-key="secaoDois.step.3.numero"></span>
                <h3 class="titulo-etapa" data-key="secaoDois.step.3.titulo"></h3>
                <p class="descricao-etapa" data-key="secaoDois.step.3.texto"></p>
            </div>
        </div>
    </section>

        <section class="container-secao-tres">
            <h4 class="titulo-secao-tres" data-key="secaoTres.titulo"></h4>

            <div class="container-cards">
                <div class="cartao-depoimento">
                    <p class="texto-depoimento" data-key="secaoTres.testemunhas.0.depoimento"></p>
                    <div class="container-avaliacao">
                        <span class="estrelas">★★★★★</span>
                    </div>
                    <p class="autor" data-key="secaoTres.testemunhas.0.nome"></p>
                </div>
                <div class="cartao-depoimento">
                    <p class="texto-depoimento" data-key="secaoTres.testemunhas.1.depoimento"></p>
                    <div class="container-avaliacao">
                        <span class="estrelas">★★★★★</span>
                    </div>
                    <p class="autor" data-key="secaoTres.testemunhas.1.nome"></p>
                </div>
                <div class="cartao-depoimento">
                    <p class="texto-depoimento" data-key="secaoTres.testemunhas.2.depoimento"></p>
                    <div class="container-avaliacao">
                        <span class="estrelas">★★★★</span>
                    </div>
                    <p class="autor" data-key="secaoTres.testemunhas.2.nome"></p>
                </div>
            </div>
        </section>

                    class="forma-preenchimento"></path>
            </svg>
        </div>
    </section>


    <section class="secao-quatro">
        <h5 class="titulo-secao-quatro" data-key="planos.titulo"></h5>

        <div class="container-planos">
            <div class="cartao-plano plano-raiz">
                <h5 class="titulo-plano" data-key="planos.planoRaiz.planoTitulo"></h5>
                <h5 class="descricao-plano" data-key="planos.planoRaiz.preco"></h5>
                <div class="caracteristicas-plano">
                    <p data-key="planos.planoRaiz.planoInfo.paragrafoUm"></p>
                    <p data-key="planos.planoRaiz.planoInfo.paragrafoDois"></p>
                    <p data-key="planos.planoRaiz.planoInfo.paragrafoTres"></p>
                    <p data-key="planos.planoRaiz.planoInfo.paragrafoQuatro"></p>
                </div>
                <button class="botao-plano" data-key="planos.planoRaiz.planoBotao"></button>
            </div>

            <div class="cartao-plano plano-folha">
                <h5 class="titulo-plano" data-key="planos.planoFolha.planoTitulo"></h5>
                <h5 class="descricao-plano" data-key="planos.planoFolha.preco"></h5>
                <div class="caracteristicas-plano">
                    <p data-key="planos.planoFolha.planoInfo.paragrafoUm"></p>
                    <p data-key="planos.planoFolha.planoInfo.paragrafoDois"></p>
                    <p data-key="planos.planoFolha.planoInfo.paragrafoTres"></p>
                    <p data-key="planos.planoFolha.planoInfo.paragrafoQuatro"></p>
                </div>
                <button class="botao-plano" data-key="planos.planoFolha.planoBotao"></button>
            </div>

            <div class="cartao-plano plano-floresta">
                <h5 class="titulo-plano" data-key="planos.planoFloresta.planoTitulo"></h5>
                <h5 class="descricao-plano" data-key="planos.planoFloresta.preco"></h5>
                <div class="caracteristicas-plano">
                    <p data-key="planos.planoFloresta.planoInfo.paragrafoUm"></p>
                    <p data-key="planos.planoFloresta.planoInfo.paragrafoDois"></p>
                    <p data-key="planos.planoFloresta.planoInfo.paragrafoTres"></p>
                    <p data-key="planos.planoFloresta.planoInfo.paragrafoQuatro"></p>
                </div>
                <button class="botao-plano" data-key="planos.planoFloresta.planoBotao"></button>
            </div>
        </div>
    </section>


    <section class="secao-cinco">
        <h6 class="titulo-faq" data-key="secaoCinco.titulo"></h6>
        <hr class="linha-titulo">

        <div class="container-faq">
            <details>
                <summary data-key="secaoCinco.faq.0.pergunta"></summary>
                <div class="conteudo-faq">
                    <p data-key="secaoCinco.faq.0.resposta"></p>
                </div>
            </details>

            <details>
                <summary data-key="secaoCinco.faq.1.pergunta"></summary>
                <div class="conteudo-faq">
                    <p data-key="secaoCinco.faq.1.resposta"></p>
                </div>
            </details>

            <details>
                <summary data-key="secaoCinco.faq.2.pergunta"></summary>
                <div class="conteudo-faq">
                    <p data-key="secaoCinco.faq.2.resposta"></p>
                </div>
            </details>
        </div>
    </section>
